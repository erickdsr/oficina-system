spring.application.name=system_oficina

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/system_oficina}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:change-this-secret-in-production-123456789abcdefghijklmnopqrstuvwxyz}
jwt.expiration=${JWT_EXPIRATION:86400000}
