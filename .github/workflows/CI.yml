name: Continuous Integration

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main
      - dev

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend | Build e testes

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v6

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Dar permissão ao Maven Wrapper
        if: ${{ hashFiles('backend/mvnw') != '' }}
        run: chmod +x mvnw

      - name: Executar build e testes com Maven Wrapper
        if: ${{ hashFiles('backend/mvnw') != '' }}
        run: ./mvnw --batch-mode clean verify

      - name: Executar build e testes com Maven
        if: ${{ hashFiles('backend/mvnw') == '' }}
        run: mvn --batch-mode clean verify

      - name: Enviar relatórios de testes do backend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/target/surefire-reports
            backend/target/failsafe-reports
          if-no-files-found: ignore
          retention-days: 7

  frontend:
    name: Frontend | Lint, testes e build

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v6

      - name: Configurar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Executar lint
        run: npm run lint

      - name: Executar testes
        run: npm test -- --run
        if: ${{ hashFiles('frontend/src/**/*.test.*', 'frontend/src/**/*.spec.*') != '' }}

      - name: Gerar build de produção
        run: npm run build

      - name: Salvar build do frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7